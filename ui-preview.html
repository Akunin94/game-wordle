<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oʻzbek Wordle — UI Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFFFF;
    --surface: #F5F5F5;
    --text: #1A1A1B;
    --text-muted: #787C7E;
    --border: #D3D6DA;
    --border-strong: #878A8C;
    --key-default: #D3D6DA;
    --key-text: #1A1A1B;
    --correct: #6AAA64;
    --present: #C9B458;
    --absent: #787C7E;
    --accent: #1A73E8;
    --toast-bg: #1A1A1B;
    --toast-text: #FFFFFF;
  }

  body.dark {
    --bg: #121213;
    --surface: #1E1E1F;
    --text: #FFFFFF;
    --text-muted: #818384;
    --border: #3A3A3C;
    --border-strong: #565758;
    --key-default: #818384;
    --key-text: #FFFFFF;
    --correct: #538D4E;
    --present: #B59F3B;
    --absent: #3A3A3C;
    --accent: #8AB4F8;
    --toast-bg: #FFFFFF;
    --toast-text: #1A1A1B;
  }

  body.colorblind {
    --correct: #1E88E5;
    --present: #F5A623;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Top bar ── */
  .topbar {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .topbar-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .topbar-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: none;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .icon-btn:hover { opacity: 0.7; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--toast-bg);
    color: var(--toast-text);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Board ── */
  .board-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 8px;
  }
  .board {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .row {
    display: flex;
    gap: 6px;
  }
  .row.shake {
    animation: shake 0.5s ease-in-out;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-6px)}
    30%{transform:translateX(6px)}
    45%{transform:translateX(-4px)}
    60%{transform:translateX(4px)}
    75%{transform:translateX(-2px)}
    90%{transform:translateX(2px)}
  }

  /* ── Tile ── */
  .tile-wrap {
    width: 56px; height: 56px;
    perspective: 600px;
  }
  .tile {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.28s ease;
  }
  .tile.flip { transform: rotateX(180deg); }
  .tile-face {
    position: absolute;
    inset: 0;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    font-weight: 700;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--bg);
    color: var(--text);
    letter-spacing: 0.5px;
    transition: border-color 0.1s;
  }
  .tile-face.back {
    transform: rotateX(180deg);
    color: #fff;
  }
  .tile-face.filled {
    border-color: var(--border-strong);
  }
  .tile-face.correct { background: var(--correct); border-color: var(--correct); }
  .tile-face.present { background: var(--present); border-color: var(--present); }
  .tile-face.absent  { background: var(--absent);  border-color: var(--absent);  }

  /* pop animation when filling */
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .tile-face.pop { animation: pop 0.1s ease; }

  /* bounce on win */
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
  .tile-wrap.bouncing { animation: bounce 0.4s ease; }

  /* ── Keyboard ── */
  .keyboard {
    width: 100%;
    max-width: 500px;
    padding: 0 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .kb-row {
    display: flex;
    justify-content: center;
    gap: 5px;
  }
  .key {
    height: 58px;
    min-width: 40px;
    padding: 0 6px;
    border: none;
    border-radius: 6px;
    background: var(--key-default);
    color: var(--key-text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    user-select: none;
  }
  .key:active { transform: scale(0.93); }
  .key.wide { min-width: 60px; font-size: 12px; }
  .key.special { min-width: 52px; background: var(--surface); border: 1px solid var(--border); font-size: 12px; }
  .key.correct { background: var(--correct); color: #fff; }
  .key.present { background: var(--present); color: #fff; }
  .key.absent  { background: var(--absent);  color: #fff; }

  /* ── Ad banner placeholder ── */
  .ad-banner {
    width: 100%;
    max-width: 500px;
    height: 50px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg);
    border-radius: 12px;
    padding: 24px;
    width: 300px;
    display: flex; flex-direction: column; gap: 10px;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.show .modal { transform: scale(1); }
  .modal-title { font-size: 22px; font-weight: 800; }
  .modal-body { font-size: 15px; color: var(--text-muted); line-height: 1.5; }
  .modal-word { color: var(--text); font-weight: 700; }
  .modal-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
  .modal-btn {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: none; color: var(--text); font-weight: 600; cursor: pointer; font-size: 14px;
  }
  .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-btn:hover { opacity: 0.85; }

  /* ── Theme toggle bar ── */
  .theme-bar {
    width: 100%; max-width: 500px;
    display: flex; gap: 8px; padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
    align-items: center;
  }
  .toggle-btn {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: none; color: var(--text-muted); font-size: 11px; cursor: pointer;
    transition: background 0.15s;
  }
  .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-title">Oʻzbek Wordle</span>
  <div class="topbar-actions">
    <button class="icon-btn" title="Leaderboard">🏆</button>
    <button class="icon-btn" title="Profile">👤</button>
    <button class="icon-btn" onclick="toggleSettings()" title="Settings">⚙</button>
  </div>
</div>

<!-- Theme switcher (preview only) -->
<div class="theme-bar">
  <span>Тема:</span>
  <button class="toggle-btn active" id="btn-light" onclick="setTheme('light')">Light</button>
  <button class="toggle-btn" id="btn-dark" onclick="setTheme('dark')">Dark</button>
</div>

<!-- Board -->
<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- Keyboard -->
<div class="keyboard" id="keyboard"></div>

<!-- Ad banner -->
<div class="ad-banner" id="ad-banner">РЕКЛАМА · AdMob Banner</div>

<!-- End modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Tabriklaymiz! 🎉</div>
    <div class="modal-body">Soʻz edi: <span class="modal-word" id="modal-word"></span></div>
    <div class="modal-body" id="modal-attempts"></div>
    <div class="modal-body">Ertaga yana urinib koʻring</div>
    <div class="modal-row">
      <button class="modal-btn" onclick="closeModal()">Reyting</button>
      <button class="modal-btn primary" onclick="closeModal()">OK</button>
    </div>
  </div>
</div>

<script>
// ─── Game state ───────────────────────────────────────────────────
const WORD_LENGTH = 5;
const MAX_ATTEMPTS = 6;
const SOLUTION = 'bozor'; // today's word

const KEYBOARD_LAYOUT = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['⌫','z','x','c','v','b','n','m','↵'],
  ["o'","g'",'sh','ch','ng'],
];

const VALID_WORDS = new Set([
  'bozor','qalam','kitob','vatan','hayot','dunyo','osmon','zamon','oydin','bulut',
  'tuman','daryo','yurak','burun','bilak','yelka','jigar','quloq','hafta','savol',
  'javob','saboq','maqol','varaq','ustoz','ustun','devor','karta','kurak','qatiq',
  'somsa','sabzi','qovun','qovoq','bodom','anjir','banan','limon','gilos','piyoz',
  'tovuq','xoroz','quyon','tulki','sigir','baliq','turna','qumri','tuxum','tuyoq',
  'gilam','sovun','sirka','surma','tugma','katta','qisqa','qalin','yupqa','issiq',
  'sovuq','quruq','iflos','tiniq','suluv','sekin','mayin','keksa','keyin','komil',
]);

let submittedGuesses = []; // [{tokens, evals}]
let currentInput = [];
let status = 'playing'; // playing | won | lost
let letterStates = {}; // letter → correct|present|absent
let shaking = false;

// ─── Tokenize ──────────────────────────────────────────────────────
function tokenize(raw) {
  const s = raw.toLowerCase();
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    const two = s.slice(i, i+2);
    if (["o'","g'",'sh','ch','ng'].includes(two)) { tokens.push(two); i+=2; continue; }
    tokens.push(s[i]); i++;
  }
  return tokens;
}

// ─── Evaluate ──────────────────────────────────────────────────────
function evaluate(guessTokens, solutionTokens) {
  const result = Array(WORD_LENGTH).fill('absent');
  const remaining = [...solutionTokens];
  for (let i=0; i<WORD_LENGTH; i++) {
    if (guessTokens[i] === solutionTokens[i]) { result[i]='correct'; remaining[i]=null; }
  }
  for (let i=0; i<WORD_LENGTH; i++) {
    if (result[i]==='correct') continue;
    const idx = remaining.findIndex(t=>t===guessTokens[i]);
    if (idx>=0) { result[i]='present'; remaining[idx]=null; }
  }
  return result;
}

// ─── Render board ──────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r=0; r<MAX_ATTEMPTS; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-'+r;

    const guess = submittedGuesses[r];
    const isCurrent = r === submittedGuesses.length && status==='playing';

    for (let c=0; c<WORD_LENGTH; c++) {
      const wrap = document.createElement('div');
      wrap.className = 'tile-wrap';
      wrap.id = `tile-${r}-${c}`;

      const tile = document.createElement('div');
      tile.className = 'tile';

      const front = document.createElement('div');
      front.className = 'tile-face';
      const back = document.createElement('div');
      back.className = 'tile-face back';

      if (guess) {
        const letter = guess.tokens[c] || '';
        const ev = guess.evals[c];
        front.textContent = letter.length>1 ? letter[0].toUpperCase()+letter.slice(1) : letter.toUpperCase();
        back.textContent = front.textContent;
        back.classList.add(ev);
        tile.classList.add('flip');
        tile.style.transitionDelay = (c * 0.1) + 's';
      } else if (isCurrent && currentInput[c]) {
        const t = currentInput[c];
        front.textContent = t.length>1 ? t[0].toUpperCase()+t.slice(1) : t.toUpperCase();
        front.classList.add('filled');
      }

      tile.appendChild(front);
      tile.appendChild(back);
      wrap.appendChild(tile);
      row.appendChild(wrap);
    }
    board.appendChild(row);
  }
}

// ─── Render keyboard ───────────────────────────────────────────────
function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KEYBOARD_LAYOUT.forEach((rowKeys, ri) => {
    const row = document.createElement('div');
    row.className = 'kb-row';
    rowKeys.forEach(k => {
      const btn = document.createElement('button');
      const isAction = k==='⌫'||k==='↵';
      const isSpecial = ["o'","g'",'sh','ch','ng'].includes(k);
      btn.className = 'key' + (isAction?' wide':'') + (isSpecial?' special':'');
      btn.textContent = k==='↵'?'ENTER': k==='⌫'?'⌫': k.length>1?k[0].toUpperCase()+k.slice(1):k.toUpperCase();
      const st = letterStates[k];
      if (st) btn.classList.add(st);
      btn.addEventListener('mousedown', e => { e.preventDefault(); handleKey(k); });
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

// ─── Toast ──────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── Shake ──────────────────────────────────────────────────────────
function shakeCurrentRow() {
  const idx = submittedGuesses.length;
  const row = document.getElementById('row-'+idx);
  if (!row) return;
  row.classList.remove('shake');
  void row.offsetWidth;
  row.classList.add('shake');
  setTimeout(() => row.classList.remove('shake'), 500);
}

// ─── Bounce on win ──────────────────────────────────────────────────
function bounceRow(rowIdx) {
  for (let c=0; c<WORD_LENGTH; c++) {
    const wrap = document.getElementById(`tile-${rowIdx}-${c}`);
    if (!wrap) continue;
    setTimeout(() => {
      wrap.classList.add('bouncing');
      setTimeout(() => wrap.classList.remove('bouncing'), 400);
    }, c * 80 + 300);
  }
}

// ─── Modal ──────────────────────────────────────────────────────────
function showModal(won, word, attempts) {
  document.getElementById('modal-title').textContent = won ? 'Tabriklaymiz! 🎉' : 'Maglubiyat 😔';
  document.getElementById('modal-word').textContent = word.toUpperCase();
  document.getElementById('modal-attempts').textContent = won ? `${attempts} / 6 urinishda` : '';
  setTimeout(() => document.getElementById('modal').classList.add('show'), 1200);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// ─── Pop animation on input ─────────────────────────────────────────
function popTile(row, col) {
  const wrap = document.getElementById(`tile-${row}-${col}`);
  if (!wrap) return;
  const front = wrap.querySelector('.tile-face:not(.back)');
  if (!front) return;
  front.classList.remove('pop');
  void front.offsetWidth;
  front.classList.add('pop');
  setTimeout(() => front.classList.remove('pop'), 100);
}

// ─── Handle input ───────────────────────────────────────────────────
function handleKey(k) {
  if (status !== 'playing') return;
  if (k === '⌫') {
    if (currentInput.length > 0) { currentInput.pop(); renderBoard(); renderKeyboard(); }
    return;
  }
  if (k === '↵') { submitGuess(); return; }
  // letter
  if (currentInput.length < WORD_LENGTH) {
    currentInput.push(k);
    const col = currentInput.length - 1;
    const row = submittedGuesses.length;
    renderBoard();
    popTile(row, col);
    renderKeyboard();
  }
}

function submitGuess() {
  if (currentInput.length < WORD_LENGTH) { showToast('Harflar yetmaydi'); shakeCurrentRow(); return; }
  const word = currentInput.join('');
  if (!VALID_WORDS.has(word)) { showToast("Soʻz lugʻatda yoʻq"); shakeCurrentRow(); return; }

  const solutionTokens = tokenize(SOLUTION);
  const evals = evaluate(currentInput, solutionTokens);
  const rowIdx = submittedGuesses.length;
  submittedGuesses.push({ tokens: [...currentInput], evals });

  // update letter states
  const priority = { correct:3, present:2, absent:1 };
  currentInput.forEach((t,i) => {
    const ev = evals[i];
    if (!letterStates[t] || priority[ev] > priority[letterStates[t]]) letterStates[t] = ev;
  });
  currentInput = [];

  const won = evals.every(e=>e==='correct');
  const lost = !won && submittedGuesses.length >= MAX_ATTEMPTS;
  if (won) { status='won'; renderBoard(); renderKeyboard(); bounceRow(rowIdx); showModal(true, SOLUTION, submittedGuesses.length); }
  else if (lost) { status='lost'; renderBoard(); renderKeyboard(); showModal(false, SOLUTION, null); }
  else { renderBoard(); renderKeyboard(); }
}

// ─── Keyboard events ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey||e.metaKey||e.altKey) return;
  const key = e.key;
  if (key==='Backspace') { handleKey('⌫'); return; }
  if (key==='Enter') { handleKey('↵'); return; }
  const lower = key.toLowerCase();
  if (/^[a-z']$/.test(lower)) {
    // check digraphs
    // simple: just push single letter; digraphs via on-screen keyboard
    handleKey(lower);
  }
});

// ─── Theme ─────────────────────────────────────────────────────────
function setTheme(t) {
  document.body.classList.remove('dark');
  ['light','dark'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id===t);
  });
  if (t==='dark') document.body.classList.add('dark');
}

function toggleSettings() { showToast('Settings screen'); }

// ─── Init ───────────────────────────────────────────────────────────
renderBoard();
renderKeyboard();
</script>
</body>
</html>
